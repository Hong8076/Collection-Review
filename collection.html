<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Collection</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>
<h1>📚 Collection</h1>
<p>Add a new question.</p>
</header>

<main>

<div class="editor">

<div class="card">

<h2>Question</h2>

<textarea
id="question"
placeholder="Type your question here..."></textarea>

<label class="upload">
📷 Question Image
<input
type="file"
id="questionImage"
accept="image/*">
</label>

<div class="category">

<h3>Category</h3>

<select id="category">

<optgroup label="History">
<option>Ancient History</option>
<option>Chinese History</option>
<option>World History</option>
<option>Modern History</option>
<option>Canadian History</option>
</optgroup>

<optgroup label="Math">
<option>Math</option>
</optgroup>

<optgroup label="Programming">
<option>Programming</option>
</optgroup>

</select>

</div>

</div>

<div class="card">

<h2>Answer</h2>

<textarea
id="answer"
placeholder="Type the answer here..."></textarea>

<label class="upload">
📷 Answer Image
<input
type="file"
id="answerImage"
accept="image/*">
</label>

</div>

</div>

<button id="save">
💾 Save Question
</button>

</main>

</body>

</html>
