<main>

<select id="category">

<optgroup label="History">
<option>Ancient History</option>
<option>Chinese History</option>
<option>World History</option>
<option>Modern History</option>
<option>Canadian History</option>
</optgroup>

<optgroup label="Math">
<option>Math</option>
</optgroup>

<optgroup label="Programming">
<option>Programming</option>
</optgroup>

</select>

<h2>Question</h2>

<textarea
id="question"
placeholder="Type your question here..."></textarea>

<label class="upload">

📷 Upload Question Image

<input
type="file"
id="questionImage"
accept="image/*">

</label>

<h2>Answer</h2>

<textarea
id="answer"
placeholder="Type the answer here..."></textarea>

<label class="upload">

📷 Upload Answer Image

<input
type="file"
id="answerImage"
accept="image/*">

</label>

<button id="save">

💾 Save Question

</button>

</main>
